<!DOCTYPE html>
<html class="dark" lang="id" style">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <title>ROrun - Onboarding</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="../assets/css/shared.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@500;700&amp;family=Outfit:wght@600;700&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error-container": "#93000a",
                        "surface-container-low": "#181b24",
                        "on-surface": "#e0e2ee",
                        "surface-container-highest": "#32353e",
                        "on-background": "#e0e2ee",
                        "surface": "#10131b",
                        "on-tertiary-container": "#005b95",
                        "surface-container": "#1c1f28",
                        "on-error": "#690005",
                        "surface-bright": "#363942",
                        "primary-fixed-dim": "#00e292",
                        "secondary-fixed": "#ffdf92",
                        "on-tertiary-fixed-variant": "#004a7a",
                        "surface-container-lowest": "#0b0e16",
                        "inverse-on-surface": "#2d3039",
                        "outline": "#849588",
                        "on-secondary-fixed": "#241a00",
                        "secondary-fixed-dim": "#f2c025",
                        "on-primary": "#003921",
                        "primary-fixed": "#51ffae",
                        "secondary-container": "#d9aa00",
                        "surface-tint": "#00e292",
                        "surface-dim": "#10131b",
                        "on-primary-container": "#00653f",
                        "surface-variant": "#32353e",
                        "on-secondary-fixed-variant": "#594400",
                        "tertiary-fixed-dim": "#9bcaff",
                        "on-tertiary": "#003256",
                        "surface-container-high": "#272a32",
                        "on-tertiary-fixed": "#001d35",
                        "background": "#10131b",
                        "inverse-primary": "#006d44",
                        "primary-container": "#19eb99",
                        "on-primary-fixed": "#002111",
                        "on-secondary": "#3e2e00",
                        "outline-variant": "#3b4a40",
                        "tertiary": "#dfecff",
                        "secondary": "#f8c62c",
                        "primary": "#9cffc6",
                        "inverse-surface": "#e0e2ee",
                        "on-error-container": "#ffdad6",
                        "on-surface-variant": "#bacbbd",
                        "on-secondary-container": "#554100",
                        "tertiary-fixed": "#d0e4ff",
                        "tertiary-container": "#abd2ff",
                        "on-primary-fixed-variant": "#005232",
                        "error": "#ffb4ab"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "section-gap": "32px",
                        "gutter": "16px",
                        "container-margin-desktop": "48px",
                        "container-margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "metric-xl": ["JetBrains Mono"],
                        "metric-md": ["JetBrains Mono"],
                        "headline-md": ["Outfit"],
                        "label-sm": ["Inter"],
                        "headline-lg": ["Outfit"],
                        "display-lg-mobile": ["Outfit"],
                        "display-lg": ["Outfit"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "metric-xl": ["40px", { "lineHeight": "40px", "letterSpacing": "-0.05em", "fontWeight": "700" }],
                        "metric-md": ["20px", { "lineHeight": "24px", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "600" }],
                        "display-lg-mobile": ["36px", { "lineHeight": "42px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }

        .glass-panel {
            background-color: hsla(225, 20%, 12%, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid hsla(0, 0%, 100%, 0.1);
        }

        .glass-input {
            background-color: hsla(225, 20%, 18%, 0.5);
            border: 1px solid hsla(0, 0%, 100%, 0.08);
            color: theme('colors.on-surface');
            transition: all 0.2s ease-in-out;
        }

        .glass-input:focus {
            outline: none;
            border-color: theme('colors.surface-tint');
            box-shadow: 0 0 12px rgba(0, 226, 146, 0.2);
            background-color: hsla(225, 20%, 18%, 0.8);
        }

        .btn-primary {
            background-color: theme('colors.surface-tint');
            color: #0F121A;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background-color: theme('colors.primary');
            box-shadow: 0 4px 20px rgba(0, 226, 146, 0.4);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid theme('colors.surface-tint');
            color: theme('colors.surface-tint');
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-secondary:hover {
            background-color: rgba(0, 226, 146, 0.1);
        }

        .progress-segment {
            height: 4px;
            background-color: hsla(0, 0%, 100%, 0.1);
            flex: 1;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, theme('colors.primary-fixed-dim'), theme('colors.tertiary-fixed-dim'));
            width: 0%;
            transition: width 0.5s ease-in-out;
        }

        .progress-fill.active {
            width: 100%;
        }

        /* Note: Intentional exclusion of navigation shell based on semantic rules for transactional screens */
    </style>
</head>

<body class="min-h-screen flex flex-col font-body-md overflow-x-hidden relative">
    <!-- Fullscreen Background Image -->
    <div class="fixed inset-0 z-[-1] bg-[radial-gradient(circle_at_top_right,rgba(25,235,153,0.08),#10131b_70%)]"></div>
    <!-- Top Persistent Progress Bar -->
    <header
        class="fixed top-0 left-0 w-full z-50 px-container-margin-mobile md:px-container-margin-desktop py-4 bg-background/50 backdrop-blur-md border-b border-white/5">
        <div class="flex items-center mb-2">
            <div class="text-headline-md font-headline-md font-bold tracking-tighter text-primary"><img alt="ROrun Logo" style="cursor:pointer;" onclick="window.location.href='home.html'"
                    class="h-8 w-auto object-contain"
                    src="../assets/logo.png">
            </div>
            <div class="text-label-sm font-label-sm text-on-surface-variant uppercase tracking-widest">Langkah 1 dari 6
            </div>
        </div>
        <div class="flex gap-2 w-full max-w-3xl mx-auto">
            <div class="progress-segment">
                <div class="progress-fill active"></div>
            </div>
            <div class="progress-segment">
                <div class="progress-fill"></div>
            </div>
            <div class="progress-segment">
                <div class="progress-fill"></div>
            </div>
            <div class="progress-segment">
                <div class="progress-fill"></div>
            </div>
            <div class="progress-segment">
                <div class="progress-fill"></div>
            </div>
            <div class="progress-segment">
                <div class="progress-fill"></div>
            </div>
        </div>
    </header>
    <main
        class="flex-grow flex items-center pt-28 pb-12 px-container-margin-mobile md:px-container-margin-desktop relative justify-center">
        <div class="w-full max-w-xl z-10">
            <!-- Form Area (Step 1 Focus) -->
            <div
                class="glass-panel rounded-3xl p-8 md:p-10 shadow-[0_8px_40px_hsla(0,0%,0%,0.5)] relative overflow-hidden group">
                <!-- Subtle ambient glow -->
                <div
                    class="absolute -top-32 -left-32 w-64 h-64 bg-primary/10 rounded-full blur-[80px] pointer-events-none">
                </div>
                <h1 class="text-headline-lg font-headline-lg text-on-surface mb-3">Profil Dasar</h1>
                <p class="text-body-md font-body-md text-on-surface-variant mb-10">Data ini membantu kami mengkalibrasi
                    metrik performa khusus untuk Anda.</p>
                <form class="space-y-8 relative z-10" id="onboarding-form">
                    <!-- Nama Lengkap -->
                    <div>
                        <label class="block text-label-sm font-label-sm text-on-surface-variant mb-2" for="nama">Nama
                            Lengkap</label>
                        <input
                            class="w-full bg-transparent !text-white rounded-xl glass-input px-5 py-4 text-body-lg font-body-lg focus:ring-0"
                            style="color: white;"
                            id="nama" placeholder="Masukkan nama Anda" type="text">
                    </div>
                    <div class="grid grid-cols-1 gap-8">
                        <!-- Usia -->
                        <div>
                            <label class="block text-label-sm font-label-sm text-on-surface-variant mb-2"
                                for="usia">Usia</label>
                            <div class="flex items-center w-full md:w-1/2">
                                <button
                                    class="glass-input px-4 py-4 rounded-l-xl hover:bg-surface-variant transition-colors"
                                    onclick="decrement('usia')" type="button">
                                    <span class="material-symbols-outlined text-on-surface">remove</span>
                                </button>
                                <input
                                    class="w-full bg-transparent !text-white text-center glass-input border-x-0 px-4 py-4 text-metric-md font-metric-md focus:ring-0"
                                    style="color: white;"
                                    id="usia" type="number" placeholder="--" min="10" max="99">
                                <button
                                    class="glass-input px-4 py-4 rounded-r-xl hover:bg-surface-variant transition-colors"
                                    onclick="increment('usia')" type="button">
                                    <span class="material-symbols-outlined text-on-surface">add</span>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <!-- Tinggi -->
                        <div>
                            <label class="block text-label-sm font-label-sm text-on-surface-variant mb-2"
                                for="tinggi">Tinggi (cm)</label>
                            <div class="relative">
                                <input
                                    class="w-full bg-transparent !text-white rounded-xl glass-input px-5 py-4 text-metric-md font-metric-md focus:ring-0"
                                    style="color: white;"
                                    id="tinggi" placeholder="170" type="number">
                                <span
                                    class="absolute right-5 top-1/2 -translate-y-1/2 text-on-surface-variant text-label-sm font-label-sm">cm</span>
                            </div>
                        </div>
                        <!-- Berat -->
                        <div>
                            <label class="block text-label-sm font-label-sm text-on-surface-variant mb-2"
                                for="berat">Berat (kg)</label>
                            <div class="relative">
                                <input
                                    class="w-full bg-transparent !text-white rounded-xl glass-input px-5 py-4 text-metric-md font-metric-md focus:ring-0"
                                    style="color: white;"
                                    id="berat" placeholder="65" type="number">
                                <span
                                    class="absolute right-5 top-1/2 -translate-y-1/2 text-on-surface-variant text-label-sm font-label-sm">kg</span>
                            </div>
                        </div>
                    </div>
                    <!-- Navigation Actions -->
                    <div class="pt-10 flex items-center border-t border-white/10 mt-10">
                        <button onclick="simpanStep1()"
                            class="btn-primary px-8 py-3.5 rounded-xl flex items-center gap-2"
                            style="background-color: #19eb99; color: #10131b;" type="button">
                            <span class="">Selanjutnya</span>
                            <span class="material-symbols-outlined text-sm text-[#0F121A]">arrow_forward</span>
                            </>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <script>
        function increment(id) {
            const el = document.getElementById(id);
            if (el) el.value = (parseInt(el.value) || 0) + 1;
        }

        function decrement(id) {
            const el = document.getElementById(id);
            const val = parseInt(el.value) || 0;
            if (el && val > 0) el.value = val - 1;
        }
    </script>
    <script src="../assets/js/shared.js"></script>
    <script>
        function simpanStep1() {
            const nama = document.getElementById('nama').value.trim();
            const usia = document.getElementById('usia').value;
            const tinggi = document.getElementById('tinggi').value;
            const berat = document.getElementById('berat').value;

            // Validasi — nama wajib diisi
            if (!nama) {
                alert('Nama lengkap wajib diisi!');
                return;
            }
            if (!usia || parseInt(usia) <= 0) {
                alert('Masukkan usia yang valid!');
                return;
            }
            if (!tinggi || parseFloat(tinggi) <= 0) {
                alert('Masukkan tinggi badan yang valid!');
                return;
            }
            if (!berat || parseFloat(berat) <= 0) {
                alert('Masukkan berat badan yang valid!');
                return;
            }

            AppState.save('nama', nama);
            AppState.save('usia', parseInt(usia));
            AppState.save('tinggi', parseFloat(tinggi));
            AppState.save('berat', parseFloat(berat));

            goTo('step2.html');
        }
    </script>


</body>

</html>
